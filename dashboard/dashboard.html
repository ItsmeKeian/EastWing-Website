<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The East Wings</title>
<style>
  /* Reset */
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #121212;
    color: #e0e0e0;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 260px;
    background: #000;
    display: flex;
    flex-direction: column;
    padding: 20px;
  }
  .sidebar h2 {
    color: white;
    margin: 0 0 30px 0;
    font-weight: 700;
    font-size: 24px;
    letter-spacing: 2px;
    user-select: none;
  }
  .sidebar nav a {
    color: #bbb;
    text-decoration: none;
    font-weight: 600;
    padding: 12px 15px;
    margin-bottom: 10px;
    border-radius: 6px;
    display: block;
    transition: background 0.3s, color 0.3s;
    user-select: none;
  }
  .sidebar nav a.active,
  .sidebar nav a:hover {
    background: #e0e0e0;
    color: #000;
  }

  /* Main content */
  .main {
    flex: 1;
    padding: 30px 40px;
    overflow-y: auto;
    background: #181818;
    display: flex;
    flex-direction: column;
  }
  .main header {
    margin-bottom: 30px;
  }
  .main header h1 {
    margin: 0;
    font-weight: 700;
    font-size: 32px;
    color: #fff;
  }

  /* Summary cards grid */
  .cards {
    width: 400px;
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
    gap: 25px;
    margin-bottom: 40px;
  }
  .card {
    background: #000;
    border-radius: 12px;
    padding: 25px;
    box-shadow: 0 8px 20px rgba(255 255 255 / 0.1);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: box-shadow 0.3s;
  }
  .card:hover {
    box-shadow: 0 10px 30px rgba(255 255 255 / 0.2);
  }
  .card h3 {
    margin: 0 0 10px 0;
    font-size: 20px;
    font-weight: 700;
    color: #e0e0e0;
    user-select: none;
  }
  .card p {
    margin: 0;
    font-size: 28px;
    font-weight: 700;
    color: #f5f5f5;
  }

  /* Table styles */
  table {
    width: 100%;
    border-collapse: collapse;
    user-select: none;
  }
  thead {
    background: #000;
  }
  thead th {
    color: #e0e0e0;
    padding: 12px 15px;
    font-weight: 600;
    text-align: left;
    border-bottom: 2px solid #333;
  }
  tbody tr {
    background: #222;
    transition: background 0.3s;
    cursor: default;
  }
  tbody tr:hover {
    background: #333;
  }
  tbody td {
    padding: 12px 15px;
    color: #ccc;
    border-bottom: 1px solid #333;
  }

  /* Buttons in table */
  button {
    background-color: #e0e0e0;
    border: none;
    color: #000;
    padding: 6px 14px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }
  button:hover {
    background-color: #fff;
  }

  /* Responsive adjustments */
  @media (max-width: 768px) {
    body {
      flex-direction: column;
    }
    .sidebar {
      width: 100%;
      flex-direction: row;
      padding: 10px;
      overflow-x: auto;
    }
    .sidebar h2 {
      flex: 1 0 auto;
      margin: 0 20px 0 0;
      font-size: 20px;
    }
    .sidebar nav a {
      flex: 1 0 auto;
      margin-right: 10px;
      margin-bottom: 0;
      padding: 10px 12px;
      text-align: center;
    }
    .main {
      padding: 20px;
      height: calc(100vh - 70px);
    }
  }
</style>
</head>
<body>

  <aside class="sidebar" role="complementary" aria-label="Sidebar Navigation">
    <h2>ADMIN</h2>
    <nav aria-label="Main Navigation">
      <a href="#" class="active" aria-current="page">Dashboard</a>
      
      <a href="../index.html">Logout</a>
    </nav>
  </aside>

  <main class="main" role="main">
    <header>
      <h1>Dashboard Overview</h1>
    </header>

    <section class="cards" aria-label="Summary Cards">
      <article class="card" tabindex="0" aria-describedby="totalOrdersDesc">
        <h3>No. of Bookings</h3>
        <p id="a1">0</p>
      </article>
      
    </section>

    <section aria-label="Recent Orders">
      <h2 style="color:#fff; margin-bottom:15px;">Bookings</h2>
      <div style="overflow: scroll ;max-height: 500px; width: 100%;">
      <table id="allrecords">
  <caption><div id="e-paginator"></div></caption>
  <thead >
    <tr>
      
      <th scope="col">Full Name</th>
      <th scope="col">Phone No.</th>
      <th scope="col">Email</th>
      <th scope="col">Address</th>
      <th scope="col">Date</th>
      <th scope="col">Time</th>
      <th scope="col">Event</th>
      <th scope="col">Messages</th>
      <th scope="col">Actions</th>
      
    </tr>
  </thead>
  <tbody class="customtable">
    <!-- Data will be injected here by JavaScript -->
  </tbody>
</table>

      </div>
    </section>
  </main>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
   <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

   <script>


   function counta() {
    var type = "Total";

    $.ajax({
        type: "POST",
        url: "../php/count.php",
        dataType: "json",
        data: {
            type: type
        },
        success: function(result) {
            var _res = result;
            if (_res.status == 1) {
                $("#a1").text(_res.unid);
            }
        }
    });
}


$(window).on("load", function() {
    counta();
    
});


$(document).on("click", ".delete-btn", function () {
    const bookId = $(this).data("id");

    if (confirm("Are you sure you want to delete this record?")) {
        $.ajax({
            type: "POST",
            url: "../php/deletebook.php",
            data: { book: bookId },
            success: function (response) {
                if (response.trim() === "success") {
                    alert("Record deleted successfully.");
                    
                    location.reload();
                } else {
                    alert("Failed to delete record: " + response);
                }
            },
            error: function (xhr, status, error) {
                alert("AJAX error: " + error);
            }
        });
    }
});






       $(function () {
    function loadClientData() {
        $("#allrecords").find("tr.re-list").remove(); // Clear old data

        $.ajax({
            type: "POST",
            url: "../php/retrecord.php",
            dataType: "json",
            success: function(result) {
                if (result.status === 0) {
                    $("#allrecords tbody").append("<tr class='re-list'><td colspan='11' class='text-center'>" + result.message + "</td></tr>");
                } else {
                    $.each(result.data, function(index, client) {
                        $("#allrecords tbody").append(
                            "<tr class='re-list'>" +
                           
                            "<td>" + client.name + "</td>" +
                            "<td>" + client.phone + "</td>" +
                            "<td>" + client.email + "</td>" +
                            "<td>" + client.address + "</td>" +
                            "<td>" + client.dateofevent + "</td>" +
                            "<td>" + client.timeofevent + "</td>" +
                            "<td>" + client.selectevent + "</td>" +
                            "<td>" + client.message + "</td>" +
                            "<td><button class='delete-btn' data-id='" + client.book + "'>Delete</button></td>" +
                            
                          
                            "</tr>"
                        );
                    });
                }
            },
            error: function(xhr, status, error) {
                console.error("AJAX Error: " + error);
                $("#allrecords tbody").append("<tr class='re-list'><td colspan='11' class='text-center'>An error occurred while fetching the data.</td></tr>");
            }
        });
    }

    // Load data on page load
    loadClientData();
});

   </script>
</body>
</html>
