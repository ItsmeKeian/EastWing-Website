<script>


    $(function () {
        
        
  $("#login").click(function(){
                 var a= $("#user").val();
                 var b= $("#pass").val();

                        checkuser(a,b);    
                          });



             function  checkuser(username, password){
            
                                jQuery.ajax({
                                url: 'php/checkuser.php',
                                type: 'POST',
                                dataType: 'json',
                                data: {
                                un: username,
                                pw: password,
       
                                    },
                                            success: function(result) {
                                                    var _res = result;
                                                          
                                                if(_res.status == 1){

                                              
                           
                                                    document.cookie = username;      
                                                    window.location = "dashboard/dashboard.html"
                                                   
                                                        } 
      
                                                  else {
                                                          alert("Login failed. Please try again.");
                                                  }
                                                  
                                       }

                                    });

                                  }


 });
